<!DOCTYPE html>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandDark: '#0284c7',
                        brandLight: '#0ea5e9',
                        constructionBlue: '#0E1E38',

                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }

        }

    <style>
